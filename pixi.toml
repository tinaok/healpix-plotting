[workspace]
authors = ["Justus Magin <keewis@posteo.de>"]
channels = ["conda-forge"]
name = "healpix-plotting"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
matplotlib-base = ">=3.10.8,<4"
numpy = ">=2.4.2,<3"
cartopy = ">=0.25.0,<0.26"
python = "3.14.*"
numpy_groupies = ">=0.11.3,<0.12"
scipy = ">=1.17.0,<2"
jupyterlab = ">=4.5.5,<5"

[pypi-dependencies]
healpix-plotting = { path = ".", editable = true }

[feature.affine.dependencies]
affine = "*"

[feature.test.dependencies]
pytest = "*"
pytest-cov = "*"

[feature.docs.dependencies]
sphinx = "*"
matplotlib = "*"
pydata-sphinx-theme = "*"
myst-nb = "*"
sphinx-autobuild = "*"
geopandas = "*"
tabulate = "*"
markdown = "*"
pandas = "*"
pyresample = "*"
astropy = ">=7.2.0,<8"
sphinx-design = "*"
pyproj = "*"

[feature.test.tasks]
tests = { cmd = "pytest --cov=healpix_plotting" }

[feature.docs.tasks]
build-docs = { cmd = "rm -rf generated/; python -m sphinx -b html -w warnings.log -W -Tn -j auto . _build", cwd = "docs" }
autobuild-docs = { cmd = "sphinx-autobuild -b html -w warnings.log -W -Tn -j auto . _build", cwd = "docs" }
build-docs-rtd = { cmd = "python -m sphinx -b html -W -T -j auto . $READTHEDOCS_OUTPUT/html", cwd = "docs" }

[feature.dev.dependencies]
ipython = "*"
jupyterlab = "*"
black = "*"
jupyter-resource-usage = "*"
jupyterlab_code_formatter = "*"
isort = "*"

[environments]
default = ["test", "dev", "affine"]
docs = ["docs"]
